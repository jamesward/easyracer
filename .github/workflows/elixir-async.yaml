# Generated file. DO NOT EDIT.
'on':
  push:
    branches:
    - main
    paths:
    - elixir-async/**
    - .github/workflows/elixir-async.yaml
  pull_request:
    paths:
    - elixir-async/**
    - .github/workflows/elixir-async.yaml
  workflow_run:
    workflows:
    - scenario-server
    types:
    - completed
jobs:
  test:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run == null || github.event.workflow_run.conclusion == 'success' }}
    steps:
    - uses: actions/checkout@v4
    - uses: erlef/setup-beam@v1
      with:
        otp-version: '27.3'
        elixir-version: 1.18.3
    - name: Cache mix deps and build
      uses: actions/cache@v4
      with:
        path: |-
          elixir-async/deps
          elixir-async/_build
        key: ${{ runner.os }}-mix-1.18.3-otp27.3-${{ hashFiles('elixir-async/mix.lock') }}
        restore-keys: ${{ runner.os }}-mix-1.18.3-otp27.3-
    - name: Install inotify-tools (silences fs backend ERROR)
      run: sudo apt-get update && sudo apt-get install -y inotify-tools
    - run: mix deps.get && mix test --slowest 5
    defaults:
      run:
        working-directory: elixir-async
