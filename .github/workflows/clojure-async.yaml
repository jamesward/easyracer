name: Build

'on':
  push:
    branches:
    - main
    paths:
    - clojure-async/**
    - .github/workflows/clojure-async.yaml
  pull_request:
    paths:
    - clojure-async/**
    - .github/workflows/clojure-async.yaml
  workflow_run:
    workflows:
    - scenario-server
    types:
    - completed

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Run tests (Clojure CLI + deps.edn)
        run: clojure -M:test
        working-directory: clojure-async