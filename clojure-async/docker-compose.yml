services:
  docker:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["--host=tcp://0.0.0.0:2375", "--tls=false"]
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 2s
      timeout: 2s
      retries: 20

  verify:
    build: .
    depends_on:
      docker:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://docker:2375
      TESTCONTAINERS_HOST_OVERRIDE: docker
    deploy:
      resources:
        reservations:
          memory: 4G
        limits:
          memory: 8G
